<script>

  const vagaLink = sessionStorage.getItem('vagaLink') || '';
  const curriculoNome = sessionStorage.getItem('curriculoNome') || '';

      url_vaga: vagaLink,        // ← passa o link da vaga

    }
  };
</script>

<script async data-id="4499317437" id="chtl-script"
